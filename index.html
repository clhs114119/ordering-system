<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>119定餐系統V3.1.0Beta1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex justify-center font-sans">
    <div class="max-w-md w-full bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border border-gray-100">
        <div class="bg-blue-600 p-8 text-white text-center">
            <h1 class="text-2xl font-black tracking-tight">119定餐系統V3.1.0Beta1</h1>
            <div id="status-tag" class="mt-2 text-[10px] tracking-widest uppercase px-3 py-1 rounded-full bg-white/20 inline-block">連線中...</div>
        </div>

        <div class="p-6 space-y-6">
            <div class="flex items-center justify-between bg-gray-50 p-5 rounded-3xl">
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">座號</label>
                    <select id="seat-select" onchange="updateUI()" class="w-full bg-transparent text-lg font-bold outline-none cursor-pointer text-gray-700">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div class="text-right border-l border-gray-200 pl-5">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">餘額</label>
                    <div id="balance-val" class="text-xl font-black text-blue-600">$ --</div>
                </div>
            </div>

            <div>
                <h2 class="font-black text-gray-800 mb-4 px-1">今日菜單 <span class="text-xs font-normal text-gray-400 ml-2">(可複選)</span></h2>
                <div id="menu-list" class="space-y-2 max-h-72 overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

            <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-blue-900">目前合計</span>
                    <span id="total-amount" class="text-3xl font-black text-blue-600">$ 0</span>
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <button id="send-btn" onclick="sendOrder()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition-all text-lg">確認送出</button>
                <button id="cancel-btn" onclick="cancelAll()" class="w-full text-gray-400 font-bold py-2 text-sm hover:text-red-500 transition-colors">取消今日所有訂單 (限 12:00 前)</button>
            </div>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbQYBYyKi_sDdd-LKv5fasV0PUXXNAN7a9RTsnS9Dq_SBgUmO0vpb7a0dx2B8DFVt2oA/exec"; // 👈 貼上你的 URL
        let globalData = { balances: {}, menu: [] };
        let selectedItems = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                
                // 修正座號選單：第一個是「請選擇」，之後依序顯示 A2-A30
                const select = document.getElementById('seat-select');
                select.innerHTML = '<option value="">請選擇</option>';
                
                // 排序座號
                const sortedSeats = Object.keys(globalData.balances)
                    .sort((a, b) => Number(a) - Number(b));

                sortedSeats.forEach(s => {
                    if(s !== "") {
                        select.innerHTML += `<option value="${s}">${s} 號</option>`;
                    }
                });

                // 渲染菜單
                const menuBox = document.getElementById('menu-list');
                globalData.menu.forEach(item => {
                    const div = document.createElement('div');
                    div.id = `item-${item.id}`;
                    div.className = "flex justify-between items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer bg-white transition-all hover:bg-gray-50";
                    div.onclick = () => {
                        const idx = selectedItems.findIndex(i => i.id === item.id);
                        if(idx > -1) {
                            selectedItems.splice(idx, 1);
                            div.className = div.className.replace(" border-blue-500 bg-blue-50", " border-gray-50 bg-white");
                        } else {
                            selectedItems.push(item);
                            div.className = div.className.replace(" border-gray-50 bg-white", " border-blue-500 bg-blue-50");
                        }
                        const total = selectedItems.reduce((s, i) => s + Number(i.price), 0);
                        document.getElementById('total-amount').innerText = `$ ${total}`;
                    };
                    div.innerHTML = `<span class="font-bold text-gray-700">${item.name}</span><span class="font-black text-gray-400">$${item.price}</span>`;
                    menuBox.appendChild(div);
                });

                const today = new Date().toLocaleDateString('en-CA');
                const isUpdated = globalData.lastUpdated === today;
                const tag = document.getElementById('status-tag');
                tag.innerText = isUpdated ? "菜單已更新" : "菜單尚未更新";
                tag.className += isUpdated ? " bg-green-500" : " bg-orange-500";

            } catch (e) { alert("讀取失敗，請檢查網路或 API 設定"); }
        }

        function updateUI() {
            const s = document.getElementById('seat-select').value;
            document.getElementById('balance-val').innerText = s ? `$ ${globalData.balances[s]}` : "$ --";
        }

        async function sendOrder() {
            const seat = document.getElementById('seat-select').value;
            const total = selectedItems.reduce((s, i) => s + Number(i.price), 0);
            if(!seat || selectedItems.length === 0) return alert("請選擇座號及餐點！");
            if(total > globalData.balances[seat]) return alert("餘額不足，無法下單！");

            if(!confirm(`確認為 ${seat} 號訂購：\n${selectedItems.map(i=>i.name).join('、')}\n共 $${total}？`)) return;

            document.getElementById('send-btn').innerText = "傳送中...";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'order', seat, item: selectedItems.map(i=>i.name).join(', '), price: total })});
            location.reload();
        }

        async function cancelAll() {
            if (new Date().getHours() >= 12) return alert("已超過中午 12:00，扣款程序已啟動，無法取消。");
            const seat = document.getElementById('seat-select').value;
            if(!seat) return alert("請先選取座號");
            if(confirm("確定取消今日「所有」訂單？")) {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel', seat })});
                alert(await res.text());
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
