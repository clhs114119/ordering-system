<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>119定餐系統 V3.1.11 Beta1</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex justify-center font-sans">
    <div class="max-w-md w-full bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border border-gray-100 flex flex-col">
        
        <div class="bg-blue-600 p-8 text-white text-center">
            <h1 class="text-2xl font-black tracking-tight">119定餐系統 V3.1.11 Beta1</h1>
            <div id="status-tag" class="mt-2 text-[10px] tracking-widest uppercase px-3 py-1 rounded-full bg-white/20 inline-block">讀取數據庫資料中...</div>
        </div>

        <div class="p-6 space-y-6">
            <div class="flex items-center justify-between bg-gray-50 p-5 rounded-3xl border border-gray-100">
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">你的座號</label>
                    <select id="seat-select" onchange="updateBalanceDisplay()" class="w-full bg-transparent text-lg font-bold outline-none cursor-pointer text-gray-700">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div class="text-right border-l border-gray-200 pl-5">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">你的餘額</label>
                    <div id="balance-val" class="text-xl font-black text-blue-600">$ --</div>
                </div>
            </div>

            <div>
                <h2 class="font-black text-gray-800 mb-4 px-1 flex justify-between">
                    <span>今日菜單</span>
                    <span class="text-xs font-normal text-gray-400">可複選</span>
                </h2>
                <div id="menu-list" class="space-y-2 max-h-72 overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

            <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-blue-900 text-sm">目前合計金額</span>
                    <span id="total-amount" class="text-3xl font-black text-blue-600">$ 0</span>
                </div>
                <div id="selected-items-hint" class="text-[10px] text-blue-400 mt-1 truncate text-right">尚未選擇餐點</div>
            </div>

            <div class="space-y-3 pt-2">
                <button id="send-btn" onclick="sendOrder()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition-all text-lg">確認送出訂單</button>
                <button id="cancel-btn" onclick="cancelAllOrders()" class="w-full text-gray-400 font-bold py-2 text-sm hover:text-red-500 transition-colors">取消今日所有訂單 (限 12:00 前)</button>
            </div>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>

    <script>
        // 🚨 重要：請在此處填入正確的 GAS 網址 (確認尾端為 /exec 且無空格)
        const API_URL = "https://script.google.com/macros/s/AKfycbzbQYBYyKi_sDdd-LKv5fasV0PUXXNAN7a9RTsnS9Dq_SBgUmO0vpb7a0dx2B8DFVt2oA/exec";
        
        let globalData = { balances: {}, menu: [] };
        let selectedItems = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                
                const select = document.getElementById('seat-select');
                select.innerHTML = '<option value="">請選擇</option>';
                
                // 座號排序與顯示
                const seatList = Object.keys(globalData.balances)
                    .filter(key => !key.includes("seat_"))
                    .sort((a, b) => Number(a) - Number(b));

                seatList.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.innerText = `${s} 號`;
                    select.appendChild(opt);
                });

                // 菜單生成
                const menuBox = document.getElementById('menu-list');
                globalData.menu.forEach(item => {
                    const div = document.createElement('div');
                    div.id = `item-${item.id}`;
                    div.className = "flex justify-between items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer bg-white transition-all";
                    div.onclick = () => toggleItem(item, div);
                    div.innerHTML = `<span class="font-bold text-gray-700">${item.name}</span><span class="font-black text-gray-400">$${item.price}</span>`;
                    menuBox.appendChild(div);
                });

                // 更新狀態標籤
                const today = new Date().toLocaleDateString('en-CA');
                const isUpdated = globalData.lastUpdated === today;
                const tag = document.getElementById('status-tag');
                tag.innerText = isUpdated ? "今日菜單已更新" : "今日菜單尚未更新";
                tag.style.backgroundColor = isUpdated ? "#22c55e" : "#f97316";

            } catch (e) {
                alert("數據加載失敗，請檢查 API 部署網址或網路連線。");
            }
        }

        function toggleItem(item, div) {
            const idx = selectedItems.findIndex(i => i.id === item.id);
            if(idx > -1) {
                selectedItems.splice(idx, 1);
                div.className = "flex justify-between items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer bg-white transition-all hover:bg-gray-50";
            } else {
                selectedItems.push(item);
                div.className = "flex justify-between items-center p-4 border-2 border-blue-500 rounded-2xl cursor-pointer bg-blue-50 transition-all shadow-sm";
            }
            const total = selectedItems.reduce((s, i) => s + Number(i.price), 0);
            document.getElementById('total-amount').innerText = `$ ${total}`;
            document.getElementById('selected-items-hint').innerText = 
                selectedItems.length > 0 ? `已選: ${selectedItems.map(i=>i.name).join(', ')}` : "尚未選擇餐點";
        }

        // 餘額顯示強化：解決 0 的問題
        function updateBalanceDisplay() {
            const seat = document.getElementById('seat-select').value;
            if (seat && globalData.balances) {
                const bal = globalData.balances[seat] ?? globalData.balances["seat_" + seat] ?? 0;
                const finalBal = (typeof bal === 'object') ? (bal.value ?? 0) : bal;
                document.getElementById('balance-val').innerText = `$ ${finalBal}`;
            } else {
                document.getElementById('balance-val').innerText = "$ --";
            }
        }

        async function sendOrder() {
            const seat = document.getElementById('seat-select').value;
            const total = selectedItems.reduce((s, i) => s + Number(i.price), 0);
            if(!seat) return alert("請先選取您的座號！");
            if(selectedItems.length === 0) return alert("請至少選擇一項餐點！");
            
            const curBal = Number(document.getElementById('balance-val').innerText.replace("$ ", ""));
            if(total > curBal) return alert(`餘額不足！總計 $${total}，您的餘額為 $${curBal}`);

            if(!confirm(`確認為 ${seat} 號訂購餐點共 ${selectedItems.length} 項嗎？`)) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true; btn.innerText = "送出訂單中...";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'order', 
                        seat: seat, 
                        items: selectedItems, // 傳送陣列以供 GAS 拆分行
                        price: total 
                    })
                });
                alert(await res.text());
                location.reload();
            } catch (e) {
                alert("訂購失敗，請重試"); btn.disabled = false; btn.innerText = "確認送出訂單";
            }
        }

        async function cancelAllOrders() {
            if (new Date().getHours() >= 12) return alert("已超過中午 12:00，無法取消。");
            const seat = document.getElementById('seat-select').value;
            if(!seat || !confirm(`確定要取消 ${seat} 號今日的所有訂單嗎？`)) return;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel', seat }) });
                alert(await res.text());
                location.reload();
            } catch (e) { alert("取消失敗"); }
        }

        init();
    </script>
</body>
</html>
