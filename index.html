<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>119定餐系統 V3.2.2 Beta2</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex justify-center font-sans overflow-x-hidden">

    <div id="menu-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
    
    <div id="side-menu" class="fixed top-0 left-0 h-full w-64 bg-white z-50 shadow-2xl transform -translate-x-full">
        <div class="p-8 bg-blue-600 text-white">
            <h2 class="text-xl font-black">系統選單</h2>
            <p class="text-[10px] opacity-70 tracking-widest">VERSION 3.2.2 Beta2</p>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="switchPage('order')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl font-bold text-gray-700 flex items-center gap-3 transition-colors">
                <span>🍱</span> 我要訂餐
            </button>
            <button onclick="switchPage('stats')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl font-bold text-gray-700 flex items-center gap-3 transition-colors">
                <span>📊</span> 今日統計
            </button>
            <div class="border-t border-gray-100 my-4"></div>
            <p class="text-[10px] text-gray-300 text-center uppercase tracking-widest">更多功能開發中</p>
        </nav>
    </div>

    <div class="max-w-md w-full bg-white shadow-2xl min-h-screen sm:min-h-0 sm:rounded-[2.5rem] sm:my-4 overflow-hidden border border-gray-100 flex flex-col relative transition-all">
        
        <div class="bg-blue-600 p-6 text-white relative shadow-lg">
            <button onclick="toggleMenu()" class="absolute left-6 top-7 text-2xl hover:scale-110 active:scale-90 transition-transform">☰</button>
            <div class="text-center">
                <h1 id="page-title" class="text-xl font-black tracking-tight">119定餐系統</h1>
                <div id="status-tag" class="mt-1 text-[10px] tracking-widest uppercase px-3 py-1 rounded-full bg-white/20 inline-block">連線中...</div>
            </div>
        </div>

        <div id="page-order" class="p-6 space-y-6 flex-1">
            <div class="flex items-center justify-between bg-gray-50 p-5 rounded-3xl border border-gray-100 shadow-inner">
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">你的座號</label>
                    <select id="seat-select" onchange="updateBalanceDisplay()" class="w-full bg-transparent text-lg font-bold outline-none cursor-pointer text-gray-700">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div class="text-right border-l border-gray-200 pl-5">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">你的餘額</label>
                    <div id="balance-val" class="text-xl font-black text-blue-600">$ --</div>
                </div>
            </div>

            <div>
                <h2 class="font-black text-gray-800 mb-4 px-1 flex justify-between items-center">
                    <span>今日菜單</span>
                    <span class="text-[10px] bg-gray-100 text-gray-400 px-2 py-1 rounded-md">可複選</span>
                </h2>
                <div id="menu-list" class="space-y-2 max-h-[38vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

            <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-blue-900 text-sm">目前合計金額</span>
                    <span id="total-amount" class="text-3xl font-black text-blue-600">$ 0</span>
                </div>
                <div id="selected-items-hint" class="text-[10px] text-blue-400 mt-1 truncate text-right">尚未選擇餐點</div>
            </div>

            <div class="space-y-3 pt-2">
                <button id="send-btn" onclick="sendOrder()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 active:scale-95 transition-all text-lg">確認送出訂單</button>
                <button onclick="cancelAllOrders()" class="w-full text-gray-400 font-bold py-2 text-sm hover:text-red-500 transition-colors">取消今日所有訂單 (限 12:00 前)</button>
            </div>
        </div>

        <div id="page-stats" class="hidden p-6 space-y-4 flex-1">
            <h2 class="font-black text-gray-800 px-1 flex items-center gap-2">📊 今日統計</h2>
            <div class="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase">
                        <tr>
                            <th class="p-4">餐點名稱</th>
                            <th class="p-4 text-center">數量</th>
                            <th class="p-4 text-right">小計</th>
                        </tr>
                    </thead>
                    <tbody id="stats-table-body" class="text-sm divide-y divide-gray-50">
                        </tbody>
                    <tfoot class="bg-blue-50 font-black text-blue-700">
                        <tr id="stats-total-row">
                            <td class="p-4">今日總結 (Total)</td>
                            <td id="total-qty" class="p-4 text-center">0</td>
                            <td id="total-sum" class="p-4 text-right">$ 0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <p class="text-[10px] text-gray-400 text-center italic">數據源自 Statistics 工作表 A2:C17</p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbQYBYyKi_sDdd-LKv5fasV0PUXXNAN7a9RTsnS9Dq_SBgUmO0vpb7a0dx2B8DFVt2oA/exec";
        
        let globalData = { balances: {}, menu: [], stats: [] };
        let selectedItems = [];

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            const isOpen = menu.style.transform === 'translateX(0px)';
            menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            overlay.classList.toggle('hidden');
        }

        function switchPage(page) {
            document.getElementById('page-order').classList.toggle('hidden', page !== 'order');
            document.getElementById('page-stats').classList.toggle('hidden', page !== 'stats');
            document.getElementById('page-title').innerText = page === 'order' ? '119定餐系統' : '今日統計';
            toggleMenu();
        }

        async function init() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                
                // 1. 座號
                const select = document.getElementById('seat-select');
                select.innerHTML = '<option value="">請選擇</option>';
                Object.keys(globalData.balances).filter(k=>!k.includes("seat_")).sort((a,b)=>Number(a)-Number(b)).forEach(s=>{
                    const opt = document.createElement('option'); opt.value = s; opt.innerText = s + " 號";
                    select.appendChild(opt);
                });

                // 2. 菜單
                const menuBox = document.getElementById('menu-list');
                globalData.menu.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer bg-white transition-all hover:bg-gray-50";
                    div.onclick = () => toggleItem(item, div);
                    div.innerHTML = `<span class="font-bold text-gray-700">${item.name}</span><span class="font-black text-gray-400">$${item.price}</span>`;
                    menuBox.appendChild(div);
                });

                // 3. 今日統計表格 (關鍵修正：確保顯示 A2:C16)
                const tableBody = document.getElementById('stats-table-body');
                tableBody.innerHTML = ""; // 清空舊內容
                
                // 抓取 A2 到 A16 (陣列索引 1 到 15)
                for (let i = 1; i < 16; i++) {
                    const row = globalData.stats[i] || { name: "", qty: 0, total: 0 };
                    // 即使沒有名稱也要顯示該格，確保表格對齊
                    const tr = document.createElement('tr');
                    const name = row.name || `(未設定項目 ${i})`;
                    const qty = row.qty === "" ? 0 : row.qty;
                    const total = row.total === "" ? 0 : row.total;
                    
                    tr.innerHTML = `<td class="p-4 font-bold text-gray-600">${name}</td>
                                    <td class="p-4 text-center">${qty}</td>
                                    <td class="p-4 text-right">$${total}</td>`;
                    tableBody.appendChild(tr);
                }

                // 抓取第 17 列總計 (陣列索引 16)
                const grandTotal = globalData.stats[16] || { qty: 0, total: 0 };
                document.getElementById('total-qty').innerText = grandTotal.qty || 0;
                document.getElementById('total-sum').innerText = `$ ${grandTotal.total || 0}`;

                // 4. 狀態
                const today = new Date().toLocaleDateString('en-CA');
                const isUpdated = globalData.lastUpdated === today;
                const tag = document.getElementById('status-tag');
                tag.innerText = isUpdated ? "今日菜單已更新" : "菜單尚未更新";
                tag.style.backgroundColor = isUpdated ? "#22c55e" : "#f97316";

            } catch (e) { alert("讀取資料失敗，請確認 API。"); }
        }

        // 其餘邏輯與上一版本完全一致
        function toggleItem(item, div) {
            const idx = selectedItems.findIndex(i => i.id === item.id);
            if(idx > -1) {
                selectedItems.splice(idx, 1);
                div.className = "flex justify-between items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer bg-white transition-all hover:bg-gray-50";
            } else {
                selectedItems.push(item);
                div.className = "flex justify-between items-center p-4 border-2 border-blue-500 rounded-2xl cursor-pointer bg-blue-50 transition-all shadow-sm";
            }
            document.getElementById('total-amount').innerText = `$ ${selectedItems.reduce((s, i) => s + Number(i.price), 0)}`;
            document.getElementById('selected-items-hint').innerText = selectedItems.length > 0 ? `已選: ${selectedItems.map(i=>i.name).join(', ')}` : "尚未選擇餐點";
        }

        function updateBalanceDisplay() {
            const s = document.getElementById('seat-select').value;
            const bal = globalData.balances[s] ?? globalData.balances["seat_" + s] ?? 0;
            document.getElementById('balance-val').innerText = `$ ${bal}`;
        }

        async function sendOrder() {
            const seat = document.getElementById('seat-select').value;
            const total = selectedItems.reduce((s, i) => s + Number(i.price), 0);
            if(!seat || selectedItems.length === 0) return alert("請選取座號及餐點！");
            const curBal = Number(document.getElementById('balance-val').innerText.replace("$ ", ""));
            if(total > curBal) return alert(`餘額不足！`);
            if(!confirm(`確認訂購？`)) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true; btn.innerText = "訂單送出中...";
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'order', seat: seat, items: selectedItems, price: total }) });
                alert("訂購成功！"); location.reload();
            } catch (e) { alert("失敗"); btn.disabled = false; }
        }

        async function cancelAllOrders() {
            if (new Date().getHours() >= 12) return alert("12:00 後無法取消。");
            const seat = document.getElementById('seat-select').value;
            if(!seat || !confirm(`確定取消？`)) return;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel', seat: seat }) });
                alert(await res.text()); location.reload();
            } catch (e) { alert("失敗"); }
        }

        init();
    </script>
</body>
</html>
