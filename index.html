<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 flex justify-center">
    <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl overflow-hidden flex flex-col">
        <div class="bg-blue-700 p-6 text-white text-center">
            <h1 class="text-2xl font-black">119定餐系統V3.1Beta1</h1>
            <div id="status-tag" class="mt-2 text-[10px] uppercase tracking-tighter inline-block px-3 py-1 rounded-full bg-blue-500">連線中...</div>
        </div>

        <div class="p-6 space-y-6">
            <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl">
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-400 mb-1">座號</label>
                    <select id="seat-select" onchange="updateUI()" class="w-full bg-transparent text-lg font-bold outline-none">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div class="text-right border-l pl-4">
                    <label class="block text-xs font-bold text-gray-400 mb-1">剩餘金額</label>
                    <div id="balance-val" class="text-xl font-black text-blue-600">$ --</div>
                </div>
            </div>

            <div>
                <h2 class="font-bold text-gray-800 mb-3 flex justify-between">
                    <span>今日菜單</span>
                    <span class="text-xs text-gray-400 font-normal">可複選</span>
                </h2>
                <div id="menu-list" class="space-y-2 max-h-64 overflow-y-auto pr-2"></div>
            </div>

            <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                <div class="flex justify-between items-center text-indigo-900 font-black">
                    <span>合計金額</span>
                    <span id="total-amount" class="text-2xl font-black text-indigo-600">$ 0</span>
                </div>
            </div>

            <div class="space-y-3">
                <button id="send-btn" onclick="sendOrder()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">確認送出</button>
                <button id="cancel-btn" onclick="cancelAll()" class="w-full text-red-500 font-bold py-2 text-sm hover:underline">取消今日所有訂單 (限 12:00 前)</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbQYBYyKi_sDdd-LKv5fasV0PUXXNAN7a9RTsnS9Dq_SBgUmO0vpb7a0dx2B8DFVt2oA/exec"; // 👈 貼上你的網址
        let globalData = { balances: {}, menu: [] };
        let selectedItems = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                
                // 座號顯示優化 (X 號)
                const select = document.getElementById('seat-select');
                select.innerHTML = '<option value="">請選擇</option>';
                Object.keys(globalData.balances).sort((a,b)=>a-b).forEach(s => {
                    if(Number(s) >= 2 && Number(s) <= 30) { // 依照試算表 A2:A30 範圍
                        select.innerHTML += `<option value="${s}">${s} 號</option>`;
                    }
                });

                // 渲染菜單
                const menuBox = document.getElementById('menu-list');
                globalData.menu.forEach(item => {
                    const div = document.createElement('div');
                    div.id = `item-${item.id}`;
                    div.className = "flex justify-between p-4 border rounded-xl cursor-pointer bg-white transition-all border-gray-100 hover:border-blue-300";
                    div.onclick = () => {
                        const idx = selectedItems.findIndex(i => i.id === item.id);
                        if(idx > -1) {
                            selectedItems.splice(idx, 1);
                            div.className = div.className.replace(" border-blue-500 bg-blue-50", "");
                        } else {
                            selectedItems.push(item);
                            div.className += " border-blue-500 bg-blue-50";
                        }
                        const total = selectedItems.reduce((s, i) => s + Number(i.price), 0);
                        document.getElementById('total-amount').innerText = `$ ${total}`;
                    };
                    div.innerHTML = `<span>${item.name}</span><span class="font-bold">$${item.price}</span>`;
                    menuBox.appendChild(div);
                });

                const today = new Date().toLocaleDateString('en-CA');
                const isUpdated = globalData.lastUpdated === today;
                const tag = document.getElementById('status-tag');
                tag.innerText = isUpdated ? "菜單已更新" : "菜單尚未更新";
                tag.style.backgroundColor = isUpdated ? "#22c55e" : "#f97316";

            } catch (e) { alert("讀取失敗"); }
        }

        function updateUI() {
            const s = document.getElementById('seat-select').value;
            document.getElementById('balance-val').innerText = s ? `$ ${globalData.balances[s]}` : "$ --";
        }

        async function sendOrder() {
            const seat = document.getElementById('seat-select').value;
            const total = selectedItems.reduce((s, i) => s + Number(i.price), 0);
            if(!seat || selectedItems.length === 0) return alert("資訊不完整");
            if(total > globalData.balances[seat]) return alert("金額不足！");

            if(!confirm(`確認為 ${seat} 號訂購共 $${total}？`)) return;

            document.getElementById('send-btn').innerText = "處理中...";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'order', seat, item: selectedItems.map(i=>i.name).join(', '), price: total })});
            location.reload();
        }

        async function cancelAll() {
            if (new Date().getHours() >= 12) return alert("已超過中午 12:00，無法取消。");
            const seat = document.getElementById('seat-select').value;
            if(!seat) return alert("請選座號");
            if(confirm("確定取消今日所有訂單？")) {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel', seat })});
                alert(await res.text());
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
