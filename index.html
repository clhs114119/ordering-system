<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>119定餐系統 V3.2.1 Beta2</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        /* 側邊選單過度動畫 */
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex justify-center font-sans overflow-x-hidden">

    <div id="menu-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
    
    <div id="side-menu" class="fixed top-0 left-0 h-full w-64 bg-white z-50 shadow-2xl transform -translate-x-full">
        <div class="p-8 bg-blue-600 text-white">
            <h2 class="text-xl font-black">選單項目</h2>
            <p class="text-xs opacity-70">V3.2.1 Beta2</p>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="switchPage('order')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-bold text-gray-700 flex items-center gap-3">
                <span>🍱</span> 我要訂餐
            </button>
            <button onclick="switchPage('stats')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-bold text-gray-700 flex items-center gap-3">
                <span>📊</span> 訂單統計
            </button>
            <div class="border-t my-4"></div>
            <p class="text-[10px] text-gray-300 text-center uppercase tracking-widest">More coming soon</p>
        </nav>
    </div>

    <div class="max-w-md w-full bg-white shadow-2xl min-h-screen sm:min-h-0 sm:rounded-[2.5rem] sm:my-4 overflow-hidden border border-gray-100 flex flex-col relative">
        
        <div class="bg-blue-600 p-6 text-white relative">
            <button onclick="toggleMenu()" class="absolute left-6 top-7 text-2xl hover:scale-110 active:scale-90 transition-transform">
                ☰
            </button>
            <div class="text-center">
                <h1 id="page-title" class="text-xl font-black tracking-tight">119定餐系統</h1>
                <div id="status-tag" class="mt-1 text-[10px] tracking-widest uppercase px-3 py-1 rounded-full bg-white/20 inline-block">讀取中...</div>
            </div>
        </div>

        <div id="page-order" class="p-6 space-y-6 flex-1">
            <div class="flex items-center justify-between bg-gray-50 p-5 rounded-3xl border border-gray-100">
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">你的座號</label>
                    <select id="seat-select" onchange="updateBalanceDisplay()" class="w-full bg-transparent text-lg font-bold outline-none cursor-pointer">
                        <option value="">請選擇</option>
                    </select>
                </div>
                <div class="text-right border-l border-gray-200 pl-5">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">你的餘額</label>
                    <div id="balance-val" class="text-xl font-black text-blue-600">$ --</div>
                </div>
            </div>

            <div>
                <h2 class="font-black text-gray-800 mb-4 px-1 flex justify-between items-center">
                    <span>今日菜單</span>
                    <span class="text-[10px] bg-gray-100 text-gray-400 px-2 py-1 rounded-md">可複選</span>
                </h2>
                <div id="menu-list" class="space-y-2 max-h-[40vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

            <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-blue-900 text-sm">目前合計金額</span>
                    <span id="total-amount" class="text-3xl font-black text-blue-600">$ 0</span>
                </div>
                <div id="selected-items-hint" class="text-[10px] text-blue-400 mt-1 truncate text-right">尚未選擇餐點</div>
            </div>

            <div class="space-y-3">
                <button id="send-btn" onclick="sendOrder()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">確認送出訂單</button>
                <button onclick="cancelAllOrders()" class="w-full text-gray-400 font-bold py-2 text-sm">取消今日訂單 (限 12:00 前)</button>
            </div>
        </div>

        <div id="page-stats" class="hidden p-6 space-y-4 flex-1">
            <h2 class="font-black text-gray-800 px-1 flex items-center gap-2">
                <span>📊</span> 今日訂購統計
            </h2>
            <div class="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase">
                        <tr>
                            <th class="p-4">項目</th>
                            <th class="p-4 text-center">數量</th>
                            <th class="p-4 text-right">小計</th>
                        </tr>
                    </thead>
                    <tbody id="stats-table-body" class="text-sm divide-y divide-gray-50"></tbody>
                    <tfoot class="bg-blue-50">
                        <tr id="stats-total-row" class="font-black text-blue-700">
                            <td class="p-4">總計</td>
                            <td id="total-qty" class="p-4 text-center">0</td>
                            <td id="total-sum" class="p-4 text-right">$ 0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <p class="text-[10px] text-gray-400 text-center italic">統計數據隨每筆成功訂單即時更新</p>
        </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbQYBYyKi_sDdd-LKv5fasV0PUXXNAN7a9RTsnS9Dq_SBgUmO0vpb7a0dx2B8DFVt2oA/exec";
        let globalData = { balances: {}, menu: [], stats: [] };
        let selectedItems = [];

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            const isOpen = menu.style.transform === 'translateX(0px)';
            
            menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            overlay.classList.toggle('hidden');
        }

        function switchPage(page) {
            document.getElementById('page-order').classList.toggle('hidden', page !== 'order');
            document.getElementById('page-stats').classList.toggle('hidden', page !== 'stats');
            document.getElementById('page-title').innerText = page === 'order' ? '119定餐系統' : '訂單統計';
            toggleMenu(); // 切換後自動關閉選單
        }

        async function init() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                
                // 1. 渲染座號
                const select = document.getElementById('seat-select');
                select.innerHTML = '<option value="">請選擇</option>';
                Object.keys(globalData.balances).filter(k=>!k.includes("seat_")).sort((a,b)=>a-b).forEach(s=>{
                    const opt = document.createElement('option'); opt.value = s; opt.innerText = s + " 號";
                    select.appendChild(opt);
                });

                // 2. 渲染菜單
                const menuBox = document.getElementById('menu-list');
                globalData.menu.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer bg-white transition-all";
                    div.onclick = () => toggleItem(item, div);
                    div.innerHTML = `<span class="font-bold text-gray-700">${item.name}</span><span class="font-black text-gray-400">$${item.price}</span>`;
                    menuBox.appendChild(div);
                });

                // 3. 渲染統計表 (跳過 A1, 抓到第 16 列數據)
                const tableBody = document.getElementById('stats-table-body');
                globalData.stats.slice(1, 16).forEach(row => {
                    if(row.name && row.name.trim() !== ""){
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td class="p-4 font-bold text-gray-600">${row.name}</td><td class="p-4 text-center">${row.qty}</td><td class="p-4 text-right">$${row.total}</td>`;
                        tableBody.appendChild(tr);
                    }
                });
                // 第 17 列總計 (索引 16)
                const grandTotal = globalData.stats[16];
                document.getElementById('total-qty').innerText = grandTotal.qty || 0;
                document.getElementById('total-sum').innerText = `$ ${grandTotal.total || 0}`;

                // 4. 更新標籤
                const today = new Date().toLocaleDateString('en-CA');
                const isUpdated = globalData.lastUpdated === today;
                const tag = document.getElementById('status-tag');
                tag.innerText = isUpdated ? "今日菜單已更新" : "今日菜單尚未更新";
                tag.style.backgroundColor = isUpdated ? "#22c55e" : "#f97316";

            } catch (e) { alert("讀取失敗，請確認 API 網址"); }
        }

        // 其餘邏輯 (toggleItem, updateBalanceDisplay, sendOrder, cancelAllOrders) 保持不變
        function toggleItem(item, div) {
            const idx = selectedItems.findIndex(i => i.id === item.id);
            if(idx > -1) {
                selectedItems.splice(idx, 1);
                div.className = "flex justify-between items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer bg-white transition-all";
            } else {
                selectedItems.push(item);
                div.className = "flex justify-between items-center p-4 border-2 border-blue-500 rounded-2xl cursor-pointer bg-blue-50 transition-all shadow-sm";
            }
            document.getElementById('total-amount').innerText = `$ ${selectedItems.reduce((s, i) => s + Number(i.price), 0)}`;
            document.getElementById('selected-items-hint').innerText = selectedItems.length > 0 ? `已選: ${selectedItems.map(i=>i.name).join(', ')}` : "尚未選擇餐點";
        }

        function updateBalanceDisplay() {
            const s = document.getElementById('seat-select').value;
            const bal = globalData.balances[s] ?? globalData.balances["seat_" + s] ?? 0;
            document.getElementById('balance-val').innerText = `$ ${bal}`;
        }

        async function sendOrder() {
            const seat = document.getElementById('seat-select').value;
            const total = selectedItems.reduce((s, i) => s + Number(i.price), 0);
            if(!seat || selectedItems.length === 0) return alert("請選座號及餐點");
            const curBal = Number(document.getElementById('balance-val').innerText.replace("$ ", ""));
            if(total > curBal) return alert("餘額不足");
            if(!confirm("確認訂購？")) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true; btn.innerText = "送出中...";
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'order', seat, items: selectedItems, price: total }) });
                alert("訂購成功！"); location.reload();
            } catch (e) { alert("失敗"); btn.disabled = false; }
        }

        async function cancelAllOrders() {
            if (new Date().getHours() >= 12) return alert("12:00 後不可取消");
            const seat = document.getElementById('seat-select').value;
            if(!seat || !confirm("確定取消今日訂單？")) return;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel', seat }) });
                alert(await res.text()); location.reload();
            } catch (e) { alert("取消失敗"); }
        }

        init();
    </script>
</body>
</html>
