<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階訂餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-white text-center">
            <h1 class="text-2xl font-black tracking-tight">線上訂餐系統</h1>
            <div id="status-tag" class="mt-2 text-[10px] uppercase tracking-widest inline-block px-3 py-1 rounded-full bg-white/20">連線中...</div>
        </div>

        <div class="p-6 space-y-6">
            <div class="flex items-center justify-between gap-4 bg-gray-50 p-4 rounded-2xl">
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">座號</label>
                    <select id="seat-select" onchange="updateBalance()" class="w-full bg-transparent text-lg font-bold outline-none cursor-pointer">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div class="text-right">
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">目前餘額</label>
                    <div id="balance-val" class="text-xl font-black text-indigo-600">$ --</div>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-3">
                    <h2 class="font-black text-gray-800 text-lg">今日菜單</h2>
                    <span class="text-xs text-gray-400">可複選餐點</span>
                </div>
                <div id="menu-list" class="space-y-2 max-h-[300px] overflow-y-auto pr-1">
                    </div>
            </div>

            <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100">
                <div class="flex justify-between items-center text-orange-800 font-bold">
                    <span>已選餐點總計</span>
                    <span id="total-amount" class="text-2xl font-black text-orange-600">$ 0</span>
                </div>
                <div id="selected-items-hint" class="text-xs text-orange-400 mt-1">尚未選擇任何餐點</div>
            </div>

            <div class="flex flex-col gap-3">
                <button id="submit-btn" onclick="sendOrder()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:shadow-indigo-200 active:scale-95 transition-all text-lg">確認送出訂單</button>
                <button onclick="cancelOrder()" class="w-full text-gray-400 font-bold py-2 text-sm hover:text-red-500 transition-colors">取消今日訂單</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbQYBYyKi_sDdd-LKv5fasV0PUXXNAN7a9RTsnS9Dq_SBgUmO0vpb7a0dx2B8DFVt2oA/exec"; // 在此處替換為你的 GAS URL
        let globalData = { balances: {}, menu: [] };
        let selectedItems = []; // 存儲多個選擇的項目

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                globalData = data;

                // 1. 更新狀態標籤 (檢查日期)
                const today = new Date().toLocaleDateString('en-CA');
                const isUpdated = globalData.lastUpdated === today;
                const tag = document.getElementById('status-tag');
                tag.innerText = isUpdated ? `菜單已更新` : `尚未更新 (舊資料)`;
                tag.className = isUpdated ? "mt-2 text-[10px] tracking-widest inline-block px-3 py-1 rounded-full bg-green-500" : "mt-2 text-[10px] tracking-widest inline-block px-3 py-1 rounded-full bg-orange-500";

                // 2. 渲染座號選單 (限制 1-30)
                const select = document.getElementById('seat-select');
                select.innerHTML = '<option value="">選擇座號</option>';
                Object.keys(globalData.balances)
                    .map(Number)
                    .filter(s => s >= 1 && s <= 30) // 限制座號範圍
                    .sort((a,b)=>a-b)
                    .forEach(s => {
                        select.innerHTML += `<option value="${s}">座號 ${s}</option>`;
                    });

                // 3. 渲染菜單
                const menuBox = document.getElementById('menu-list');
                menuBox.innerHTML = '';
                globalData.menu.forEach(item => {
                    const div = document.createElement('div');
                    div.id = `item-${item.id}`;
                    div.className = "flex justify-between items-center p-4 border rounded-2xl cursor-pointer hover:bg-gray-50 transition-all border-gray-100 bg-white";
                    div.onclick = () => toggleItem(item);
                    div.innerHTML = `<span class="font-bold text-gray-700">${item.name}</span><span class="font-bold text-gray-400">$${item.price}</span>`;
                    menuBox.appendChild(div);
                });

            } catch (e) {
                console.error(e);
                alert("連線異常，請確認 API URL 是否正確部署且開放權限。");
            }
        }

        function toggleItem(item) {
            const index = selectedItems.findIndex(i => i.id === item.id);
            const el = document.getElementById(`item-${item.id}`);

            if (index > -1) {
                selectedItems.splice(index, 1);
                el.classList.remove('border-indigo-500', 'bg-indigo-50', 'ring-4', 'ring-indigo-100');
            } else {
                selectedItems.push(item);
                el.classList.add('border-indigo-500', 'bg-indigo-50', 'ring-4', 'ring-indigo-100');
            }
            calculateTotal();
        }

        function calculateTotal() {
            const total = selectedItems.reduce((sum, item) => sum + Number(item.price), 0);
            document.getElementById('total-amount').innerText = `$ ${total}`;
            
            const hint = document.getElementById('selected-items-hint');
            hint.innerText = selectedItems.length > 0 ? `已選: ${selectedItems.map(i => i.name).join(', ')}` : "尚未選擇任何餐點";
            
            return total;
        }

        function updateBalance() {
            const seat = document.getElementById('seat-select').value;
            const balance = globalData.balances[seat] || 0;
            document.getElementById('balance-val').innerText = seat ? `$ ${balance}` : "$ --";
        }

        async function sendOrder() {
            const seat = document.getElementById('seat-select').value;
            const total = calculateTotal();
            const balance = globalData.balances[seat] || 0;

            if(!seat) return alert("請先選擇座號！");
            if(selectedItems.length === 0) return alert("請至少選擇一個餐點！");
            if(total > balance) return alert(`餘額不足！總計 $${total}，您的餘額僅 $${balance}`);

            if(!confirm(`確認為座號 ${seat} 訂購：\n${selectedItems.map(i=>i.name).join('、')}\n共 $${total}？`)) return;

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'order', 
                        seat, 
                        item: selectedItems.map(i => i.name).join(', '), // 將多個品名串成字串
                        price: total 
                    })
                });
                alert(await res.text());
                location.reload();
            } catch (e) {
                alert("送出失敗");
                btn.disabled = false;
                btn.innerText = "確認送出訂單";
            }
        }

        async function cancelOrder() {
            const seat = document.getElementById('seat-select').value;
            if(!seat) return alert("請選擇座號以利查詢訂單");
            if(!confirm("確定要取消今日最後一筆訂單？")) return;

            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'cancel', seat })
            });
            alert(await res.text());
            location.reload();
        }

        init();
    </script>
</body>
</html>
