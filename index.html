<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>119定餐系統 V3.4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義背景圖設定 */
        body {
            background-image: url('https://raw.githubusercontent.com/clhs114119/ordering-system/refs/heads/main/background%20image/IMG_2131.JPG'); /* ⬅️ 請在此替換你的 GitHub 圖片連結 */
            background-size: cover;
            background-position: top center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        #side-menu { 
            transition: transform 0.3s ease-in-out; 
            display: flex; 
            flex-direction: column;
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
        }

        /* 主容器半透明與毛玻璃效果 */
        .glass-container {
            background-color: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .menu-btn-large { padding: 25px; margin: -25px; font-size: 2rem; }
        .disabled-btn { background-color: #cbd5e1 !important; cursor: not-allowed !important; transform: none !important; opacity: 0.7; }
    </style>
</head>
<body class="min-h-screen flex justify-center font-sans overflow-x-hidden">

    <div id="loading-screen" class="fixed inset-0 bg-blue-600/95 z-[100] hidden flex flex-col items-center justify-center text-white">
        <div class="w-16 h-16 border-4 border-white/30 border-t-white rounded-full animate-spin mb-6"></div>
        <h2 class="text-xl font-black mb-2 tracking-widest uppercase">處理中</h2>
        <p class="text-sm opacity-80 animate-pulse">請勿關閉頁面...</p>
    </div>

    <div id="menu-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
    <div id="side-menu" class="fixed top-0 left-0 h-full w-64 z-50 shadow-2xl transform -translate-x-full">
        <div class="p-8 bg-blue-600/90 text-white shrink-0">
            <h2 class="text-xl font-black italic">119 訂餐系統</h2>
            <p class="text-[10px] opacity-60 tracking-widest">V3.4.2 Stable</p>
        </div>
        
        <nav class="p-4 space-y-2 flex-grow">
            <button onclick="switchPage('order')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl font-bold text-gray-700 flex items-center gap-3">🍱 訂餐介面</button>
            <button onclick="switchPage('stats')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl font-bold text-gray-700 flex items-center gap-3">📊 今日統計</button>
            <div class="border-t border-gray-100 my-4"></div>
            <button onclick="switchPage('admin')" class="w-full text-left p-4 hover:bg-red-50 rounded-2xl font-bold text-red-600 flex items-center gap-3">⚙️ 管理員頁面</button>
        </nav>

        <div class="p-6 bg-white/50 border-t border-gray-100 shrink-0">
            <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Update Log</h3>
            <div class="space-y-3 max-h-40 overflow-y-auto custom-scrollbar pr-2 text-[11px] leading-relaxed text-gray-500">
                <div>
                    <p class="font-bold text-blue-600">V3.4.2 (Current)</p>
                    <p>• 自定義 GitHub 背景圖支援</p>
                    <p>• 介面半透明毛玻璃特效</p>
                </div>
                <div>
                    <p class="font-bold text-gray-700">V3.4.1</p>
                    <p>• 加入側邊欄更新日誌</p>
                </div>
            </div>
        </div>
    </div>

    <div class="glass-container max-w-md w-full shadow-2xl min-h-screen sm:min-h-0 sm:rounded-[2.5rem] sm:my-4 overflow-hidden flex flex-col relative border border-white/20">
        
        <div class="bg-blue-600/90 p-8 text-white relative shadow-lg">
            <button onclick="toggleMenu()" class="absolute left-8 top-8 menu-btn-large">☰</button>
            <div class="text-center">
                <h1 id="page-title" class="text-xl font-black tracking-tight">訂餐介面</h1>
                <div id="status-tag" class="mt-1 text-[8px] tracking-widest uppercase px-3 py-1 rounded-full bg-white/20 inline-block">讀取資料中...</div>
            </div>
        </div>

        <div id="page-order" class="p-6 space-y-6 flex-1">
            <div class="flex items-center justify-between bg-white/50 p-5 rounded-3xl border border-white/30 shadow-sm">
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">你的座號</label>
                    <select id="seat-select" onchange="updateBalanceDisplay()" class="w-full bg-transparent text-lg font-bold outline-none text-gray-700"></select>
                </div>
                <div class="text-right border-l border-gray-200 pl-5">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">目前餘額</label>
                    <div id="balance-val" class="text-xl font-black text-blue-600">$ --</div>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end px-1 mb-2">
                    <h3 class="font-black text-gray-700">今日菜單</h3>
                    <span class="text-[10px] font-bold text-blue-500 animate-pulse">(可複選所需餐點)</span>
                </div>
                <div id="menu-list" class="space-y-2 max-h-[35vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

            <div class="bg-blue-50/70 p-5 rounded-3xl border border-blue-100">
                <div class="flex justify-between items-center text-blue-900 font-bold">
                    <span>合計金額</span>
                    <span id="total-amount" class="text-3xl font-black text-blue-600">$ 0</span>
                </div>
            </div>
            <div class="space-y-3">
                <button id="order-submit-btn" onclick="sendOrder()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">確認送出訂單</button>
                <button id="cancel-orders-btn" onclick="cancelAllOrders()" class="w-full text-gray-600/60 font-bold py-2 text-xs hover:text-red-500">取消我今日所有訂單 (限 12:00 前)</button>
            </div>
        </div>

        <div id="page-stats" class="hidden p-6 space-y-4 flex-1">
            <h2 class="font-black text-gray-800 px-1">📊 今日統計</h2>
            <div class="bg-white/40 border border-white/30 rounded-3xl overflow-hidden shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/50 text-[10px] text-gray-400 font-bold uppercase">
                        <tr><th class="p-4">餐點</th><th class="p-4 text-center">量</th><th class="p-4 text-right">小計</th></tr>
                    </thead>
                    <tbody id="stats-table-body" class="divide-y divide-gray-100"></tbody>
                    <tfoot class="bg-blue-50/80 font-black text-blue-700">
                        <tr><td class="p-4">總結（不含飲料）</td><td id="total-qty" class="p-4 text-center">0</td><td id="total-sum" class="p-4 text-right">$ 0</td></tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div id="page-admin" class="hidden p-6 space-y-6 flex-1">
            <div id="admin-login" class="space-y-4 py-10 text-center">
                <h2 class="font-black text-gray-800">輸入管理密鑰</h2>
                <input type="password" id="admin-key-input" class="w-full p-4 rounded-2xl border-2 border-white/50 bg-white/30 text-center text-2xl tracking-widest focus:bg-white/80 transition-all outline-none" placeholder="****">
                <button onclick="unlockAdmin()" class="w-full bg-red-600/90 text-white font-bold py-4 rounded-2xl">確認登入</button>
            </div>
            <div id="admin-content" class="hidden space-y-6">
                <div class="bg-white/60 p-5 rounded-3xl shadow-sm space-y-4 border border-orange-100">
                    <h3 class="font-black text-orange-700 border-b border-orange-100 pb-2">⚠️ 訂餐限制解鎖</h3>
                    <p class="text-[10px] text-orange-500">解除今日 12:00 鎖定或「菜單未更新」之限制。</p>
                    <button onclick="triggerEmergencyUnlock()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold active:scale-95 transition-all">解除今日訂餐限制</button>
                </div>
                <div class="bg-white/60 p-5 rounded-3xl shadow-sm space-y-4 border border-white/50">
                    <h3 class="font-black text-gray-700 border-b border-gray-100 pb-2">🍱 修改價格</h3>
                    <div id="admin-menu-edit" class="space-y-2 max-h-40 overflow-y-auto custom-scrollbar"></div>
                    <button onclick="updateMenu()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">更新菜單</button>
                </div>
                <div class="bg-white/60 p-5 rounded-3xl shadow-sm space-y-4 border border-green-100">
                    <h3 class="font-black text-green-700 border-b border-green-100 pb-2">💰 用戶加值</h3>
                    <select id="recharge-seat" onchange="calcRecharge()" class="w-full p-3 rounded-xl border border-gray-200 font-bold bg-white/50"></select>
                    <input type="number" id="recharge-amount" oninput="calcRecharge()" class="w-full p-3 rounded-xl border border-gray-200 bg-white/50" placeholder="加值金額">
                    <button id="recharge-btn" onclick="rechargeUser()" disabled class="w-full bg-gray-300 text-white py-3 rounded-xl font-bold">確認加值</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // JS 部分保持與 V3.4.1 完全一致 (包含所有 API 呼叫、注入防護邏輯)
        const API_URL = "https://script.google.com/macros/s/AKfycbzbQYBYyKi_sDdd-LKv5fasV0PUXXNAN7a9RTsnS9Dq_SBgUmO0vpb7a0dx2B8DFVt2oA/exec"; 
        let globalData = {};
        let selectedItems = [];
        let adminKey = ""; 
        let isMenuUpdated = false;

        async function init() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                renderBaseUI();
            } catch (e) { alert("連線失敗"); }
        }

        function renderBaseUI() {
            const seatSelects = [document.getElementById('seat-select'), document.getElementById('recharge-seat')];
            seatSelects.forEach(s => {
                s.innerHTML = '<option value="">請選擇座號</option>';
                Object.keys(globalData.balances).sort((a,b)=>a-b).forEach(num => {
                    const opt = document.createElement('option'); opt.value = num; opt.innerText = num + " 號";
                    s.appendChild(opt);
                });
            });

            const menuBox = document.getElementById('menu-list');
            menuBox.innerHTML = "";
            globalData.menu.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 border-2 border-white/40 rounded-2xl cursor-pointer bg-white/60 hover:bg-white/90 transition-all";
                div.onclick = () => toggleItem(item, div);
                div.innerHTML = `<span class="font-bold text-gray-700">${item.name}</span><span class="font-black text-gray-400">$${item.price}</span>`;
                menuBox.appendChild(div);
            });

            const tableBody = document.getElementById('stats-table-body');
            tableBody.innerHTML = "";
            for (let i = 1; i < 16; i++) {
                const row = globalData.stats[i] || { name: "", qty: 0, total: 0 };
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-4 font-bold text-gray-600">${row.name || "---"}</td><td class="p-4 text-center">${row.qty || 0}</td><td class="p-4 text-right">$${row.total || 0}</td>`;
                tableBody.appendChild(tr);
            }
            document.getElementById('total-qty').innerText = globalData.stats[16]?.qty || 0;
            document.getElementById('total-sum').innerText = `$ ${globalData.stats[16]?.total || 0}`;

            const today = new Date().toLocaleDateString('en-CA');
            const now = new Date();
            const tag = document.getElementById('status-tag');
            const cancelBtn = document.getElementById('cancel-orders-btn');
            const orderBtn = document.getElementById('order-submit-btn');
            
            isMenuUpdated = (globalData.lastUpdated === today);
            const isUnlocked = globalData.emergencyUnlocked === true;

            if (isUnlocked) {
                tag.innerText = "管理員已暫時解鎖訂餐";
                tag.style.backgroundColor = "#a855f7"; 
                orderBtn.classList.remove('disabled-btn');
                orderBtn.innerText = "確認送出訂單";
                if (now.getHours() >= 12) cancelBtn.innerText = "取消我今日所有訂單 (限今日 12:00 以後)";
            } else {
                tag.innerText = isMenuUpdated ? "今日菜單已更新" : "菜單尚未更新";
                tag.style.backgroundColor = isMenuUpdated ? "#22c55e" : "#f97316";
                if (!isMenuUpdated) {
                    orderBtn.classList.add('disabled-btn');
                    orderBtn.innerText = "菜單未更新，暫不開放訂餐";
                }
            }

            const adminMenu = document.getElementById('admin-menu-edit');
            adminMenu.innerHTML = "";
            globalData.menu.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 bg-white/40 p-2 rounded-lg text-xs";
                div.innerHTML = `<span class="flex-1 font-bold">${item.name}</span><input type="number" data-id="${item.id}" class="w-16 p-1 border rounded text-right price-input bg-white/50" value="${item.price}">`;
                adminMenu.appendChild(div);
            });
        }

        function toggleItem(item, div) {
            const idx = selectedItems.findIndex(i => i.id === item.id);
            if(idx > -1) {
                selectedItems.splice(idx, 1);
                div.className = "flex justify-between items-center p-4 border-2 border-white/40 rounded-2xl cursor-pointer bg-white/60";
            } else {
                selectedItems.push(item);
                div.className = "flex justify-between items-center p-4 border-2 border-blue-500 rounded-2xl cursor-pointer bg-blue-50/80 shadow-sm";
            }
            document.getElementById('total-amount').innerText = `$ ${selectedItems.reduce((s,i)=>s+Number(i.price), 0)}`;
        }

        function updateBalanceDisplay() {
            const s = document.getElementById('seat-select').value;
            document.getElementById('balance-val').innerText = `$ ${globalData.balances[s] || 0}`;
        }

        async function sendOrder() {
            if (!isMenuUpdated && !globalData.emergencyUnlocked) return alert("今日菜單尚未更新！");
            const seat = document.getElementById('seat-select').value;
            const total = selectedItems.reduce((s,i)=>s+Number(i.price), 0);
            if(!seat || selectedItems.length === 0) return alert("資訊不完整");
            if(total > (globalData.balances[seat] || 0)) return alert("餘額不足");
            if(!confirm(`確認訂購總計 $${total}？`)) return;
            callAPI({ action: 'order', seat: seat, items: selectedItems });
        }

        async function cancelAllOrders() {
            const seat = document.getElementById('seat-select').value;
            if(!seat || !confirm(`確定取消今日所有相關訂單？`)) return;
            callAPI({ action: 'cancel', seat: seat });
        }

        function unlockAdmin() {
            if(document.getElementById('admin-key-input').value === globalData.adminKey) {
                adminKey = globalData.adminKey;
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
            } else alert("密鑰錯誤");
        }

        async function triggerEmergencyUnlock() {
            if(confirm("確定解除今日限制嗎？")) callAPI({ action: 'triggerUnlock', key: adminKey });
        }

        function calcRecharge() {
            const seat = document.getElementById('recharge-seat').value;
            const val = Number(document.getElementById('recharge-amount').value);
            const btn = document.getElementById('recharge-btn');
            if(seat && val > 0) {
                btn.disabled = false; btn.classList.replace('bg-gray-300', 'bg-green-600');
            } else {
                btn.disabled = true; btn.classList.replace('bg-green-600', 'bg-gray-300');
            }
        }

        async function rechargeUser() {
            const seat = document.getElementById('recharge-seat').value;
            const amt = document.getElementById('recharge-amount').value;
            callAPI({ action: 'recharge', seat: seat, amount: amt, key: adminKey });
        }

        async function updateMenu() {
            const newMenu = Array.from(document.querySelectorAll('.price-input')).map(i=>({id: i.dataset.id, price: i.value}));
            callAPI({ action: 'updateMenu', newMenu: newMenu, key: adminKey });
        }

        async function callAPI(payload) {
            document.getElementById('loading-screen').classList.remove('hidden');
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert(await res.text());
                location.reload();
            } catch (e) { alert("連線異常"); document.getElementById('loading-screen').classList.add('hidden'); }
        }

        function toggleMenu() {
            const m = document.getElementById('side-menu');
            const o = document.getElementById('menu-overlay');
            const open = m.style.transform === 'translateX(0px)';
            m.style.transform = open ? 'translateX(-100%)' : 'translateX(0px)';
            o.classList.toggle('hidden');
        }

        function switchPage(p) {
            ['order', 'stats', 'admin'].forEach(id => {
                const el = document.getElementById('page-'+id);
                if (el) el.classList.toggle('hidden', id !== p);
            });
            document.getElementById('page-title').innerText = (p === 'order') ? '訂餐介面' : (p === 'stats' ? '今日統計' : '管理員後台');
            toggleMenu();
        }

        init();
    </script>
</body>
</html>
